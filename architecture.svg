<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#475569"/></marker>
    <marker id="b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
    <marker id="c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
    <marker id="d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
  </defs>
  <rect width="900" height="560" fill="#f8fafc"/>
  <!-- grid -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="0" y1="20" x2="900" y2="20"/><line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="80" x2="900" y2="80"/><line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="140" x2="900" y2="140"/><line x1="0" y1="160" x2="900" y2="160"/><line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="220" x2="900" y2="220"/><line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="260" x2="900" y2="260"/><line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="320" x2="900" y2="320"/><line x1="0" y1="340" x2="900" y2="340"/><line x1="0" y1="360" x2="900" y2="360"/><line x1="0" y1="380" x2="900" y2="380"/><line x1="0" y1="400" x2="900" y2="400"/><line x1="0" y1="420" x2="900" y2="420"/><line x1="0" y1="440" x2="900" y2="440"/><line x1="0" y1="460" x2="900" y2="460"/><line x1="0" y1="480" x2="900" y2="480"/><line x1="0" y1="500" x2="900" y2="500"/><line x1="0" y1="520" x2="900" y2="520"/><line x1="0" y1="540" x2="900" y2="540"/>
    <line x1="20" y1="0" x2="20" y2="560"/><line x1="40" y1="0" x2="40" y2="560"/><line x1="60" y1="0" x2="60" y2="560"/><line x1="80" y1="0" x2="80" y2="560"/><line x1="100" y1="0" x2="100" y2="560"/><line x1="120" y1="0" x2="120" y2="560"/><line x1="140" y1="0" x2="140" y2="560"/><line x1="160" y1="0" x2="160" y2="560"/><line x1="180" y1="0" x2="180" y2="560"/><line x1="200" y1="0" x2="200" y2="560"/><line x1="220" y1="0" x2="220" y2="560"/><line x1="240" y1="0" x2="240" y2="560"/><line x1="260" y1="0" x2="260" y2="560"/><line x1="280" y1="0" x2="280" y2="560"/><line x1="300" y1="0" x2="300" y2="560"/><line x1="320" y1="0" x2="320" y2="560"/><line x1="340" y1="0" x2="340" y2="560"/><line x1="360" y1="0" x2="360" y2="560"/><line x1="380" y1="0" x2="380" y2="560"/><line x1="400" y1="0" x2="400" y2="560"/><line x1="420" y1="0" x2="420" y2="560"/><line x1="440" y1="0" x2="440" y2="560"/><line x1="460" y1="0" x2="460" y2="560"/><line x1="480" y1="0" x2="480" y2="560"/><line x1="500" y1="0" x2="500" y2="560"/><line x1="520" y1="0" x2="520" y2="560"/><line x1="540" y1="0" x2="540" y2="560"/><line x1="560" y1="0" x2="560" y2="560"/><line x1="580" y1="0" x2="580" y2="560"/><line x1="600" y1="0" x2="600" y2="560"/><line x1="620" y1="0" x2="620" y2="560"/><line x1="640" y1="0" x2="640" y2="560"/><line x1="660" y1="0" x2="660" y2="560"/><line x1="680" y1="0" x2="680" y2="560"/><line x1="700" y1="0" x2="700" y2="560"/><line x1="720" y1="0" x2="720" y2="560"/><line x1="740" y1="0" x2="740" y2="560"/><line x1="760" y1="0" x2="760" y2="560"/><line x1="780" y1="0" x2="780" y2="560"/><line x1="800" y1="0" x2="800" y2="560"/><line x1="820" y1="0" x2="820" y2="560"/><line x1="840" y1="0" x2="840" y2="560"/><line x1="860" y1="0" x2="860" y2="560"/><line x1="880" y1="0" x2="880" y2="560"/>
  </g>
  <!-- title -->
  <text x="24" y="30" font-family="Courier New,monospace" font-size="14" font-weight="bold" fill="#0f172a">Agent Firewall — System Architecture</text>
  <text x="24" y="46" font-family="Courier New,monospace" font-size="10" fill="#64748b">Prompt Injection Defense for Multi-Agent Systems</text>
  <line x1="24" y1="50" x2="480" y2="50" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="876" y="30" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">v2.0 · Jun 2026</text>

  <!-- USER -->
  <rect x="24" y="80" width="108" height="52" rx="2" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="78" y="100" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="bold" fill="#0f172a">USER</text>
  <line x1="32" y1="104" x2="124" y2="104" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="78" y="118" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">any input</text>
  <text x="78" y="128" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">(may be malicious)</text>

  <!-- arrow user → firewall -->
  <line x1="132" y1="106" x2="188" y2="106" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- FIREWALL — orange highlight -->
  <rect x="190" y="64" width="152" height="84" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="196" y="76" font-family="Courier New,monospace" font-size="7" fill="#ea580c">// agent_2</text>
  <text x="266" y="94" text-anchor="middle" font-family="Courier New,monospace" font-size="13" font-weight="bold" fill="#c2410c">FIREWALL</text>
  <text x="266" y="108" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">SecurityGuardian</text>
  <line x1="198" y1="113" x2="334" y2="113" stroke="#fed7aa" stroke-width="0.8"/>
  <text x="266" y="124" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#78716c">scan · detect · block · log</text>
  <text x="266" y="136" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#78716c">risk_score &gt; 0.7 → BLOCK</text>

  <!-- SAFE arrow right -->
  <line x1="342" y1="106" x2="396" y2="106" stroke="#16a34a" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="369" y="99" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#16a34a">SAFE ✓</text>

  <!-- BLOCKED arrow down -->
  <line x1="266" y1="148" x2="266" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="278" y="183" font-family="Courier New,monospace" font-size="8" fill="#dc2626">BLOCKED ✗</text>

  <!-- THREAT LOG -->
  <rect x="170" y="212" width="192" height="68" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="176" y="225" font-family="Courier New,monospace" font-size="7" fill="#dc2626">// threats.json</text>
  <text x="266" y="240" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="bold" fill="#b91c1c">THREAT LOG</text>
  <line x1="178" y1="244" x2="354" y2="244" stroke="#fecaca" stroke-width="0.8"/>
  <text x="266" y="256" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">timestamp · threat_type</text>
  <text x="266" y="268" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">risk_score · reason → dashboard</text>

  <!-- ORCHESTRATOR -->
  <rect x="398" y="74" width="140" height="64" rx="2" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="404" y="86" font-family="Courier New,monospace" font-size="7" fill="#64748b">// agent_1</text>
  <text x="468" y="104" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#0f172a">ORCHESTRATOR</text>
  <line x1="406" y1="108" x2="530" y2="108" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="468" y="120" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">task decomposition</text>
  <text x="468" y="131" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">delegates to executor</text>

  <!-- arrow orch → exec -->
  <line x1="538" y1="106" x2="590" y2="106" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- EXECUTOR -->
  <rect x="592" y="74" width="140" height="64" rx="2" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="598" y="86" font-family="Courier New,monospace" font-size="7" fill="#64748b">// agent_3</text>
  <text x="662" y="104" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#0f172a">EXECUTOR</text>
  <line x1="600" y1="108" x2="724" y2="108" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="662" y="120" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">runs safe tool calls</text>
  <text x="662" y="131" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#64748b">Planner · Outlook · M365</text>

  <!-- arrow exec → verifier -->
  <line x1="732" y1="106" x2="784" y2="106" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- VERIFIER — purple, NEW badge -->
  <rect x="786" y="62" width="44" height="14" rx="2" fill="#7c3aed"/>
  <text x="808" y="72" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="white" font-weight="bold">NEW</text>
  <rect x="786" y="74" width="90" height="64" rx="2" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="792" y="86" font-family="Courier New,monospace" font-size="7" fill="#7c3aed">// agent_4</text>
  <text x="831" y="102" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#6d28d9">VERIFIER</text>
  <line x1="792" y1="106" x2="868" y2="106" stroke="#ddd6fe" stroke-width="0.8"/>
  <text x="831" y="118" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">hallucination</text>
  <text x="831" y="129" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">check</text>

  <!-- arrow verifier → output -->
  <line x1="831" y1="138" x2="831" y2="178" stroke="#16a34a" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- OUTPUT -->
  <rect x="778" y="180" width="106" height="44" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="831" y="200" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#15803d">✓ VERIFIED</text>
  <text x="831" y="214" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#57534e">response to user</text>

  <!-- FLAGGED arrow from verifier -->
  <line x1="876" y1="106" x2="876" y2="180" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#c)"/>
  <text x="884" y="148" font-family="Courier New,monospace" font-size="7" fill="#dc2626">FLAGGED</text>
  <text x="884" y="158" font-family="Courier New,monospace" font-size="7" fill="#dc2626">→ retry</text>

  <!-- DIVIDER -->
  <line x1="24" y1="302" x2="876" y2="302" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ATTACK TYPES -->
  <text x="24" y="322" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#0f172a">Attack Types Intercepted by Firewall:</text>
  <text x="32" y="340" font-family="Courier New,monospace" font-size="9" fill="#475569">→ [1] prompt_injection     hidden instructions inside normal-looking text</text>
  <text x="32" y="356" font-family="Courier New,monospace" font-size="9" fill="#475569">→ [2] jailbreak            "ignore all previous rules / developer mode"</text>
  <text x="32" y="372" font-family="Courier New,monospace" font-size="9" fill="#475569">→ [3] role_impersonation   "I am the system administrator, override safety"</text>
  <text x="32" y="388" font-family="Courier New,monospace" font-size="9" fill="#475569">→ [4] data_exfiltration    forward conversation history to external address</text>

  <!-- TECH STACK -->
  <rect x="440" y="310" width="430" height="96" rx="2" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="452" y="326" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="#0f172a">Stack</text>
  <line x1="448" y1="330" x2="862" y2="330" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="456" y="344" font-family="Courier New,monospace" font-size="9" fill="#475569">Platform  :  Microsoft Azure AI Foundry</text>
  <text x="456" y="358" font-family="Courier New,monospace" font-size="9" fill="#475569">SDK       :  azure-ai-agents (Python 3.14)</text>
  <text x="456" y="372" font-family="Courier New,monospace" font-size="9" fill="#475569">Auth      :  DefaultAzureCredential / az login</text>
  <text x="456" y="386" font-family="Courier New,monospace" font-size="9" fill="#475569">Models    :  gpt-4.1-mini (x4 agents)</text>
  <text x="456" y="400" font-family="Courier New,monospace" font-size="9" fill="#475569">Dashboard :  HTML · GitHub Pages</text>

  <!-- PIPELINE QUICK REF -->
  <rect x="24" y="418" width="852" height="52" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="36" y="434" font-family="Courier New,monospace" font-size="8" fill="#64748b">pipeline:</text>
  <text x="92" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#0f172a">user_input</text>
  <text x="168" y="434" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">──▶</text>
  <text x="194" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#ea580c">firewall.scan()</text>
  <text x="300" y="434" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">──[SAFE]──▶</text>
  <text x="384" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#0f172a">orchestrator.plan()</text>
  <text x="508" y="434" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">──▶</text>
  <text x="534" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#0f172a">executor.run()</text>
  <text x="630" y="434" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">──▶</text>
  <text x="656" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#6d28d9">verifier.check()</text>
  <text x="764" y="434" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">──▶</text>
  <text x="790" y="434" font-family="Courier New,monospace" font-size="9" font-weight="bold" fill="#15803d">response</text>
  <text x="92" y="460" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">           ──[BLOCKED]──▶</text>
  <text x="284" y="460" font-family="Courier New,monospace" font-size="9" fill="#dc2626">threats.json (logged + shown on dashboard)</text>

  <!-- NOTES -->
  <text x="24" y="492" font-family="Courier New,monospace" font-size="8" fill="#94a3b8"># firewall intercepts BEFORE orchestrator sees input</text>
  <text x="24" y="506" font-family="Courier New,monospace" font-size="8" fill="#94a3b8"># verifier runs AFTER executor — catches hallucinations before user sees output</text>

  <!-- AUTHOR -->
  <text x="876" y="548" text-anchor="end" font-family="Courier New,monospace" font-size="8" fill="#94a3b8">Bhanuja Tirumareddy · Microsoft Agents League Hackathon 2026</text>
</svg>
